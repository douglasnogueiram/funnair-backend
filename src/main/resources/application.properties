# Application Name
spring.application.name=flight-booking-assistant

# ========== DATABASE CONFIGURATION ==========
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vector_store}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ========== MCP CLIENT ==========
spring.ai.mcp.client.enabled=false
spring.ai.mcp.client.name=flighBookingAssistant
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.request-timeout=30s
spring.ai.mcp.client.toolcallback.enabled=true

# Conexão SSE para o servidor MCP
spring.ai.mcp.client.sse.connections.travelServer.url=${MCP_SERVER_URL:http://localhost:8085}
spring.ai.mcp.client.sse.connections.travelServer.sse-endpoint=/sse
spring.ai.mcp.client.enabled=true


# ========== MCP SERVER ==========
spring.ai.mcp.server.enabled=true
# Server identification
spring.ai.mcp.server.name=flightBookingAssistant
spring.ai.mcp.server.version=0.0.1

# Server type (SYNC/ASYNC)
spring.ai.mcp.server.type=SYNC

# Transport configuration
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
spring.ai.mcp.server.sse-endpoint=/sse

# Change notifications
spring.ai.mcp.server.resource-change-notification=true
spring.ai.mcp.server.tool-change-notification=true
spring.ai.mcp.server.prompt-change-notification=true

# Logging (required for STDIO transport)
spring.main.banner-mode=off
# logging.file.name=./target/starter-webflux-server.log
spring.ai.mcp.server.annotation-scanner.enabled=true


# Observability configuration removed - using Spring Boot native OTLP support
management.tracing.enabled=true

# Ativar endpoints de observabilidade
management.endpoints.web.exposure.include=*
management.tracing.enabled=true
# Spring AI observability
spring.ai.chat.client.observations.include-input=true
spring.ai.chat.observations.include-prompt==true
spring.ai.chat.observations.include-completion=true
spring.ai.image.observations.include-prompt=true
spring.ai.vectorstore.observations.include-query-response=true
management.tracing.sampling.probability=1.0
# Log de debug para ver os detalhes
logging.level.org.springframework.ai.chat.client.observation=DEBUG
logging.level.org.springframework.ai.chat.observation=DEBUG
spring.ai.chat.observations.log-prompt=true
spring.ai.chat.observations.log-completion=true

#spring.ai.openai.chat.options.response-format.type=JSON_SCHEMA
#spring.ai.openai.chat.options.response-format.name=MySchemaName
#spring.ai.openai.chat.options.response-format.schema={"type":"object","properties":{"steps":{"type":"array","items":{"type":"object","properties":{"explanation":{"type":"string"},"output":{"type":"string"}},"required":["explanation","output"],"additionalProperties":false}},"final_answer":{"type":"string"}},"required":["steps","final_answer"],"additionalProperties":false}
#spring.ai.openai.chat.options.response-format.strict=true

spring.autoconfigure.exclude=\
  org.springframework.boot.actuate.autoconfigure.tracing.BraveAutoConfiguration
  
  # Spans mais detalhados
management.tracing.baggage.enabled=true
management.tracing.baggage.remote-fields=*

# Métricas de timing
management.metrics.distribution.percentiles-histogram.http.server.requests=true

