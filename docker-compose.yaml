services:

    app:
        build: .
        container_name: flight-booking-app
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
            chroma:
                condition: service_started
            loki:
                condition: service_started
            tempo:
                condition: service_started
        environment:
            # Database
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_NAME=${POSTGRES_DB:-vector_store}
            - DB_USER=${POSTGRES_USER:-postgres}
            - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
            # OpenAI
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            # Chroma Vector Store
            - CHROMA_HOST=http://chroma
            - CHROMA_PORT=8000
            # MCP Client (access host machine from container)
            - MCP_SERVER_URL=http://host.docker.internal:8085
            # Observability
            - LOKI_URL=http://loki:3100/loki/api/v1/push
            # Vaadin Production Mode
            - vaadin.productionMode=true
            # Spring Profile
            - SPRING_PROFILES_ACTIVE=default
        ports:
            - "8080:8080"
        networks:
            - net
        healthcheck:
            test: "curl -f http://localhost:8080/actuator/health || exit 1"
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s

    chroma:
        image: ghcr.io/chroma-core/chroma:1.0.0
        restart: always
        environment:
            - IS_PERSISTENT=TRUE
        volumes:
            - chroma-data:/chroma/chroma/
        ports:
            - 8000:8000
        networks:
            - net

    postgres:
        image: ankane/pgvector:v0.5.0
        restart: always
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
            - POSTGRES_DB=${POSTGRES_DB:-vector_store}
            - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
        logging:
            options:
                max-size: 10m
                max-file: "3"
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./src/main/resources/db/init-database.sql:/docker-entrypoint-initdb.d/init-database.sql
        healthcheck:
            test: "pg_isready -U postgres -d vector_store"
            interval: 2s
            timeout: 20s
            retries: 10
        networks:
            - net

    # pgadmin:
    #   container_name: pgadmin_container
    #   image: dpage/pgadmin4
    #   environment:
    #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
    #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    #   volumes:
    #     - ./servers.json:/pgadmin4/servers.json
    #   ports:
    #     - "${PGADMIN_PORT:-5050}:80"

    prometheus:
        container_name: prometheus
        image: prom/prometheus:v2.54.0 # https://hub.docker.com/r/prom/prometheus
        extra_hosts: [ 'host.docker.internal:host-gateway' ]
        command:
            - --enable-feature=exemplar-storage
            - --web.enable-remote-write-receiver
            - --config.file=/etc/prometheus/prometheus.yml
        volumes:
            - prometheus:/prometheus
            - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        ports:
            - "9091:9090"
    grafana:
        container_name: grafana
        image: grafana/grafana:11.1.4 # https://hub.docker.com/r/grafana/grafana/tags and https://github.com/grafana/grafana/releases
        extra_hosts: [ 'host.docker.internal:host-gateway' ]
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
            - GF_AUTH_DISABLE_LOGIN_FORM=true
        volumes:
            - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
            - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
            - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
            - ./docker/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
        ports:
            - "3000:3000"
    tempo-init:
        # Tempo runs as user 10001, and docker compose creates the volume as root.
        # As such, we need to chown the volume in order for Tempo to start correctly.
        # This should not be needed but this is the official solution recommended by Tempo maintainers
        # See: https://github.com/grafana/tempo/blob/a21001a72a5865bfcfc1b0d2dfa30160c5a26103/example/docker-compose/local/docker-compose.yaml
        # See: https://github.com/grafana/tempo/issues/1657
        image: &tempoImage grafana/tempo:2.5.0 # https://hub.docker.com/r/grafana/tempo/tags and https://github.com/grafana/tempo/releases
        user: root
        entrypoint:
            - "chown"
            - "10001:10001"
            - "/var/tempo"
        volumes:
            - tempo:/var/tempo
    tempo:
        container_name: tempo
        image: *tempoImage
        extra_hosts: [ 'host.docker.internal:host-gateway' ]
        command: [ '-config.file=/etc/tempo.yml' ]
        depends_on: [ 'tempo-init' ]
        volumes:
            - tempo:/var/tempo
            - ./docker/grafana/tempo.yml:/etc/tempo.yml:ro
        ports:
            - "3200:3200" # tempo
            - "4317:4317" # otlp grpc
            - "4318:4318" # otlp http
            - "9411:9411" # zipkin
    loki:
        container_name: loki
        image: grafana/loki:3.0.1 # https://hub.docker.com/r/grafana/loki/tags and https://github.com/grafana/loki/releases
        extra_hosts: [ 'host.docker.internal:host-gateway' ]
        command: [ '-config.file=/etc/loki/local-config.yaml' ]
        ports:
            - "3100:3100"
    maildev:
        container_name: maildev
        image: maildev/maildev:2.1.0 # https://hub.docker.com/r/maildev/maildev/tags
        extra_hosts: [ 'host.docker.internal:host-gateway' ]
        ports:
            - "3001:1080"
            - "25:1025"
volumes:
    prometheus:
        driver: local
    tempo:
        driver: local
    chroma-data:
        driver: local
    postgres-data:
        driver: local
networks:
    net:
        driver: bridge
