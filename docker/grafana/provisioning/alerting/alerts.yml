          isPaused: false
        - uid: fb-mcp-server-down
          title: MCP Payment Server Down
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 60
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                editorMode: code
                expr: up{job="mcp-payment-server"}
                hide: false
